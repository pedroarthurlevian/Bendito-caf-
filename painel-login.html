<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bendito Café | Login do Painel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Inter,sans-serif;background:linear-gradient(180deg,#0a130f,#142019 50%,#0d1713);color:#f3eadf}
    .card{width:min(100%,460px);background:linear-gradient(180deg,#fffdf9,#f1e6d6);color:#1b261f;border-radius:28px;padding:32px;box-shadow:0 22px 46px rgba(0,0,0,.2)}
    .eyebrow{display:inline-block;margin-bottom:12px;text-transform:uppercase;letter-spacing:.18em;font-size:.78rem;color:#5e7a43}
    h1{margin:0 0 14px;font-family:"Cormorant Garamond",serif;font-size:3rem;line-height:.95}
    p{margin:0 0 22px;color:rgba(27,38,31,.72);line-height:1.75}
    form{display:grid;gap:14px}
    label{display:grid;gap:8px;font-weight:700}
    input{height:52px;border-radius:14px;border:1px solid rgba(27,38,31,.12);padding:0 16px;font:inherit}
    button,a{border:0;border-radius:999px;padding:14px 18px;text-decoration:none;font-weight:800;text-align:center}
    .primary{background:linear-gradient(135deg,#91b15c,#d3e1b1);color:#102016}
    .secondary{background:#102016;color:#f7f1e6}
    .feedback{min-height:22px;color:#8d4332;font-weight:700}
  </style>
</head>
<body>
  <div class="card">
    <span class="eyebrow">Acesso restrito</span>
    <h1>Painel Bendito</h1>
    <p>Entre com o e-mail e senha criados em Authentication no Supabase.</p>
    <form id="loginForm">
      <label>E-mail
        <input type="email" id="email" placeholder="admin@benditocafe.com" required />
      </label>
      <label>Senha
        <input type="password" id="password" placeholder="Digite sua senha" required />
      </label>
      <button class="primary" type="submit">Entrar</button>
      <a class="secondary" href="index.html">Voltar ao site</a>
      <div class="feedback" id="loginFeedback"></div>
    </form>
  </div>
  <script type="module" src="assets/login.js"></script>
</body>
</html>
