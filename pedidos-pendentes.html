<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bendito Café | Pedidos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/pending-orders.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar__inner">
      <a class="brand" href="dashboard.html">
        <span class="brand__seal">B</span>
        <span><strong>Bendito Café</strong><small>Tela de pedidos</small></span>
      </a>
      <div class="topbar__actions">
        <a class="ghost-btn" href="dashboard.html">Painel</a>
        <a class="ghost-btn" href="caixa.html">Caixa</a>
        <button id="logoutButton" class="ghost-btn">Sair</button>
      </div>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <section class="hero">
        <div>
          <span class="eyebrow">Pedidos</span>
          <h1>Pedidos salvos no Supabase.</h1>
          <p>Atualize o status do pedido e envie para o caixa quando estiver entregue.</p>
        </div>
        <div class="filters">
          <label>Filtrar status
            <select id="statusFilter">
              <option value="all">Todos</option>
              <option value="Aguardando pagamento no caixa">Aguardando pagamento</option>
              <option value="Recebido">Recebido</option>
              <option value="Em preparo">Em preparo</option>
              <option value="Pronto">Pronto</option>
              <option value="Entregue">Entregue</option>
            </select>
          </label>
          <label>Buscar cliente
            <input type="text" id="searchCustomer" placeholder="Nome do cliente" />
          </label>
        </div>
      </section>

      <section class="status-shortcuts">
        <button class="shortcut active" data-filter="all">Todos</button>
        <button class="shortcut" data-filter="Aguardando pagamento no caixa">Pagamento</button>
        <button class="shortcut" data-filter="Recebido">Recebidos</button>
        <button class="shortcut" data-filter="Em preparo">Em preparo</button>
        <button class="shortcut" data-filter="Pronto">Prontos</button>
        <button class="shortcut" data-filter="Entregue">Entregues</button>
      </section>

      <section id="ordersList" class="orders-list"></section>
    </div>
  </main>

  <script type="module" src="assets/auth-guard.js"></script>
  <script type="module" src="assets/pending-orders.js"></script>
</body>
</html>
